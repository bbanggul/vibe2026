name: Update Cafeteria Menu

on:
  schedule:
    - cron: '0 22 * * 0'  # 매주 일요일 22:00 UTC = 월요일 07:00 KST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 deep-translator

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated menu
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cafeteria_data.json
          git diff --cached --quiet || git commit -m "chore: 학식 메뉴 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
